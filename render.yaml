databases:
  - name: program-plan-db
    plan: free
    region: oregon

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: program-plan-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: program-plan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false           # Enter your frontend URL after deploy

  # ── Frontend (React static build) ────────────────────────────────────────────
  - type: web
    name: program-plan-app
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # Enter: https://program-plan-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
