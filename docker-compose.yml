version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: aba_app
      POSTGRES_USER: aba_user
      POSTGRES_PASSWORD: aba_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/src/db/seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql

  server:
    build: ./server
    restart: always
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgres://aba_user:aba_password@db:5432/aba_app
      JWT_SECRET: change_this_in_production_please
      PORT: 5000
      # Allow requests from localhost AND the host machine's LAN IP (wife's laptop)
      # Vite proxies all /api calls, so CORS origin is the Vite server itself (port 5173)
      CLIENT_URL: http://localhost:5173
      CLIENT_URL_LAN: http://192.168.1.198:5173
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - '5173:5173'
    environment:
      # No VITE_API_URL — client falls back to /api which Vite proxies to the server container.
      # This means ANY device on the network using port 5173 gets API access automatically.
      VITE_PROXY_TARGET: http://server:5000
    depends_on:
      - server

volumes:
  postgres_data:
