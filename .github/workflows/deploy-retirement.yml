name: Deploy Retirement Dashboard

on:
  push:
    branches: [main, master]
    paths:
      - 'retirement-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: retirement-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: retirement-app/package-lock.json

      - uses: actions/configure-pages@v4

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          PLAID_CLIENT_ID: placeholder
          PLAID_SECRET: placeholder
          PLAID_ENV: sandbox
          ANTHROPIC_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://soldisn2025-png.github.io/Retirement

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: retirement-app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
